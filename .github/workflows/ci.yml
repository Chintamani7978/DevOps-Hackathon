name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-backend:latest', secrets.DOCKERHUB_USERNAME) || 'skillpulse-backend:latest' }}
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-backend:{1}', secrets.DOCKERHUB_USERNAME, github.sha) || format('skillpulse-backend:{0}', github.sha) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-frontend:latest', secrets.DOCKERHUB_USERNAME) || 'skillpulse-frontend:latest' }}
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-frontend:{1}', secrets.DOCKERHUB_USERNAME, github.sha) || format('skillpulse-frontend:{0}', github.sha) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  generate-summary:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗️ Output Architecture Diagram
        run: |
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          ## 🏗️ SkillPulse Pipeline Architecture
          
          ```mermaid
          graph TD
              classDef action fill:#2ea44f,stroke:#333,stroke-width:2px,color:#fff;
              classDef docker fill:#0db7ed,stroke:#333,stroke-width:2px,color:#fff;
              
              Dev["👨‍💻 Developer"] -->|git push| GitHub["🐙 GitHub Repository"]
              
              subgraph CI [GitHub Actions - CI]
                  Build["⚙️ Build Images in Parallel"]:::action
              end
              
              GitHub -->|Triggers| CI
              Build -->|Pushes| DockerHub["🐳 Docker Hub"]:::docker
              
              subgraph CD [GitHub Actions - CD]
                  Deploy["🚀 Deploy via SSH"]:::action
              end
              
              CI -->|Triggers| CD
              Deploy -.->|Pulls Images| DockerHub
              Deploy -->|Executes| EC2["☁️ AWS EC2 Instance"]
              
              subgraph Server [AWS EC2]
                  Nginx["🌐 NGINX Frontend"]:::docker
                  Go["⚙️ Go Backend API"]:::docker
                  DB["🗄️ MySQL Database"]:::docker
              end
              
              EC2 --> Nginx
              EC2 --> Go
              EC2 --> DB
          ```
          EOF
